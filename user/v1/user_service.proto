syntax = 'proto3';  

package user; 

option go_package = "github.com/Junaidmdv/goalcirlcle-protos/user/v1;userv1";  
import "google/protobuf/timestamp.proto"; 

message RegisterRequest { 
    string email =1; 
    string password=2; 
    string confirm_password=3;
}   


message RegisterResponse{
  string email=1;  
  optional bool otp_status=2; 
  google.protobuf.Timestamp otp_expires_at=3;
} 

message VerifyOtpReq {
   string email=1;  
   string otp=3;

} 

message VerifyOtpRes{    
   bool success=1; 
   string session_id=2;
   string user_id=3; 
   string email=4;
   string access_token=5; 
   google.protobuf.Timestamp access_token_expiry=6;  
   string refresh_token=7; 
   google.protobuf.Timestamp refresh_token_expiry=8;

} 


message LoginRequest{
   string email=1; 
   string password=2;
} 


message LoginResponse{
   string session_id=1;
   string user_id=2; 
   string email=3;
   string access_token=4; 
   google.protobuf.Timestamp access_token_expiry=5;  
   string refresh_token=6; 
   google.protobuf.Timestamp refresh_token_expiry=7;
} 


message ResendOtpReq{
   string email=1;  
   string otp_type=2;
} 

message ResendOtpRes{
   bool success=1; 
   google.protobuf.Timestamp otp_expiry=2;
}

message ForgotPasswordReq{
   string email=1;
}

message ForgotPasswordRes{
     bool  success=1; 
     google.protobuf.Timestamp otp_expiry=2;
} 

message VerifyForgotPasswordReq{ 
   string email=1; 
   string otp=2;
} 

message VerifyForgotPasswordRes{
   bool success=1; 
   string reset_token=2;
   google.protobuf.Timestamp reset_token_expiry=3;
}  

message ResetPasswordReq{
    string email=1;  
    string password=2;
    string confirm_password=3;  
    string reset_token=4;

}  

message ResetPasswordRes{
   bool success=1;
}  

message RenewAccessTokenReq{
   string refresh_token=1;
}


message RenewAccessTokenRes{
   string access_token=1; 
   google.protobuf.Timestamp access_token_expiry=2;
} 


message LogOutReq{
   string refresh_token=1; 

}  

message LogOutRes{
   bool success=1;
} 


message GoogleAuthReq{
    string session_id=1; 

} 


message GoogleAuthRes{
   string redirect_url=1;
   string state=2; 
   google.protobuf.Timestamp expires_at=3;
}  


message GoogleCallbackReq{
   string callback_code=1;
}

message GoogleCallbackRes{
   string session_id=1;
   string user_id=2; 
   string email=3;
   string access_token=4; 
   google.protobuf.Timestamp access_token_expiry=5;  
   string refresh_token=6; 
   google.protobuf.Timestamp refresh_token_expiry=7;
} 


message ChangePasswordReq{
  string user_id=1;
  string old_password=2; 
  string new_password=3; 
} 

message ChangePasswordRes{
   bool success=1;
}


message AddUserRoleReq{
   string user_id=1; 
   string role=2; 
   string refresh_token=3; 
}  

message AddUserRoleRes{
   string session_id=1;
   string user_id=2; 
   string email=3;
   string access_token=4; 
   google.protobuf.Timestamp access_token_expiry=5;  
   string refresh_token=6; 
   google.protobuf.Timestamp refresh_token_expiry=7;
}  


message RemoveUserRoleReq{
   string user_id=1; 
   string refresh_token=2;
}


message RemoveUserRoleRes{
   bool success=1; 
}



// authentication of users services
service AuthService{ 
  //rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenRes);
  //registeration of user account
  rpc Register(RegisterRequest)returns(RegisterResponse);     
  //verfiy otp 
  rpc VerfiyOtp(VerifyOtpReq)returns(VerifyOtpRes);
  //user login
  rpc Login(LoginRequest)returns(LoginResponse); 
  //resend otp 
  rpc ResendOtp(ResendOtpReq) returns(ResendOtpRes); 

  rpc ForgotPassword(ForgotPasswordReq)returns(ForgotPasswordRes);  

  rpc VerifyForgotPassword(VerifyForgotPasswordReq)returns(VerifyForgotPasswordRes); 

  rpc ResetPassword(ResetPasswordReq)returns(ResetPasswordRes); 

  rpc RenweAccessToken(RenewAccessTokenReq)returns(RenewAccessTokenRes); 

  rpc LogOut(LogOutReq)returns(LogOutRes);

  rpc AddUserRole(AddUserRoleReq)returns(AddUserRoleRes);   

  rpc RemoveUserRole(RemoveUserRoleReq)returns(RemoveUserRoleRes);

  rpc GoogleAuth(GoogleAuthReq)returns(GoogleAuthRes);  

  rpc GoogleAuthCallback(GoogleCallbackReq)returns(GoogleCallbackRes);   

  rpc ChangePassword(ChangePasswordReq)returns(ChangePasswordRes);
}


message AdminRegisterRequest{
    string full_name=1;   
    string email =2; 
    string password=3; 
    string confirm_password=4;
}

message AdminRegisterResponse{
   string email=1; 
} 


message  AdminLoginRequest{  
   string email=1; 
   string password=2; 
} 

message AdminLoginResponse{
   string session_id=1;
   string admin_id=2; 
   string full_name=3; 
   string email=4;
   string access_token=5; 
   google.protobuf.Timestamp access_token_expiry=6;  
   string refresh_token=7; 
   google.protobuf.Timestamp refresh_token_expiry=8;
} 



service AdminAuthService{
     rpc AdminRegister(AdminRegisterRequest)returns(AdminRegisterResponse); 
     rpc AdminLogin(AdminLoginRequest)returns(AdminLoginResponse); 
}


message BlockUserReq{
  string user_id=1; 
} 

message BlockUserRes{
  bool success=1;
} 


message UnblockUserReq{
  string user_id=1; 
} 

message UnblockUserRes{
   bool success=1;
}

message User{
   string user_id=1; 
   string email =2;  
   string role=3; 
   bool  is_blocked=4;
   google.protobuf.Timestamp created_at = 5; 
}

message Paginate{
   int32 total_page=1;  
   int32 page=2; 
   int32 limit=3; 
   int32 totalItem=4;
}

message GetUserResponse{
  repeated User users=1;  
  Paginate paginate = 2;

}

message GetUserReq{
    int32  page=1; 
    int32  limit=2; 
    bool   is_blocked=3;
    string role=4;
   optional string search=5;
}





service  AdminUserManagementService { 
   rpc  GetUsers(GetUserReq)returns(GetUserResponse);
   rpc BlockUser(BlockUserReq)returns(BlockUserRes); 
   rpc UnBlockUser(UnblockUserReq)returns(UnblockUserRes);
}  

