syntax ='proto3'; 

package team; 

option go_package = "github.com/Junaidmdv/goalcircle-protos/user/v1;teamv1";  

import "google/protobuf/timestamp.proto";


message TeamOwnerDetails{
    string user_id=1;    
    string full_name=2; 
}




message CreateTeamReq{
    string name=1; 
    string city=2; 
    string description = 3; 
    string refresh_token=4;   
    string contact_num=5;  
    string email=6;
    TeamOwnerDetails owner=8;
}



message UserRes{
   string session_id=1; 
   string user_id=2;  
   string email=3;  
   string access_token=4;  
   google.protobuf.Timestamp access_token_expiry=5; 
   string refresh_token=6; 
   google.protobuf.Timestamp refresh_token_expiry=7;
} 

message TeamDetailsRes{
  string id=1;  
  string name=2; 
  string short_name=3;  
  string city=4; 
  string team_code=5;
} 

message TeamMemberDetails{
  string team_member_id=1; 
  string full_name=2;
  string role=3;
}


message CreateTeamRes{   
  UserRes user=1;  
  TeamDetailsRes team_details=2; 
  TeamMemberDetails team_member=3;

} 


message UpdateTeamReq{   
  string team_id=1; 
  string team_member_id=2;
  optional string name=3; 
  optional string city=4; 
  optional string description = 5; 
  optional string short_name=6;
}


message UpdateTeamRes{  
  string team_id=1; 
  string name=2; 
  string city=3; 
  string description = 4; 
  string short_name=5;
}


message RegisterTeamMemberReq{
   
} 

message RegisterTeamMemberRes{

}


message UpdateTeamContactDetailsReq{  
    string contact_email=1; 
    string contact_phone_num=2;
    string team_id=3; 
    string team_member_id=4;
}

message UpdateTeamContactDetailsRes{
  string team_id=1; 
  string contact_email=2; 
  string contact_phone_num=3; 
}

message SetCaptainRes{ 
  string player_id=2;
} 

message SetCaptainReq{
   string user_id=1; 
   string team_id=2; 
   string player_id=3; 
}

message SetViceCaptainRes{
   string player_id=1;
}

message SetViceCaptainReq{
   string user_id=1; 
   string team_id=2; 
   string player_id=3;
}  


enum TeamStatus {
  TEAM_STATUS_UNSPECIFIED = 0;
  TEAM_STATUS_ACTIVE = 1;
  TEAM_STATUS_INACTIVE = 2;
  TEAM_STATUS_SUSPENDED = 3;
  TEAM_STATUS_ARCHIVED = 4;
}


message ListTeamReq{
   int32  page=1; 
   int32 limit=2; 
   string city=3;
   TeamStatus team_status=4;
   string search=5;
}


message TeamDetails{
   string team_id=1; 
   string name=2;  
   string city=3;  
   string logo_url=4;  
   string team_code=5;  
   TeamStatus team_status=6;
} 


message  PaginateTeam {
   int32 total_page=1; 
   int32 page=2; 
   int32 limit=3;  
   int64 total_item=4;
}



message ListTeamRes{
  repeated TeamDetails team_details = 1; 
  PaginateTeam pagination=2;
}


message GetTeamReq{
   string team_id=1; 
}  



message GetTeamRes{
   string team_id=1; 
   string name=2;  
   string short_name=3;  
   string city=4;  
   string logo_url=5;  
   string team_code=6;  
   string contact_email=7; 
   string contact_phone_num=8; 
   TeamStatus team_status=9;  
   int32 player_count=10;  
   string manager_id=11; 
   string caption_id=12;  
   string vice_caption_id=13;
}




service TeamService {
   rpc CreateTeam(CreateTeamReq)returns (CreateTeamRes); 
   rpc UpdateTeam(UpdateTeamReq)returns(UpdateTeamRes);  
   rpc RegisterTeamMember(RegisterTeamMemberReq)returns(RegisterTeamMemberRes);  
   rpc UpdateTeamContactDetail(UpdateTeamContactDetailsReq)returns(UpdateTeamContactDetailsRes); 
   rpc SetCaptain(SetCaptainReq)returns(SetCaptainRes); 
   rpc SetViceCaptain(SetViceCaptainReq)returns(SetViceCaptainRes); 
   rpc ListTeam(ListTeamReq)returns(ListTeamRes); 
   rpc GetTeam(GetTeamReq)returns(GetTeamRes);
    
}




message AddPlayerReq{  
 string full_name=1; 
 google.protobuf.Timestamp date_of_birth=2;  
 int32 jersey_number=3;  
 int32 position=4;  
 float height=5;
 float weight=6;   
 string team_id=7; 
 string team_memeber_id=8;
} 

message AddPlayerRes{ 
  string player_id=1; 
  string team_member_id=2; 
  string full_name=3; 
  int32 jersey_number=4; 
  PlayerPosition player_position = 5; 
  PlayerStatus player_status =6;
}

message UpdatePlayerStatusReq{
   string player_id =1; 
   PlayerStatus player_status=2;
}

message UpdatePlayerStatusRes{
  bool success=1;
} 

enum  PlayerStatus {
  STATUS_UNSPECIFIED = 0; 
  STATUS_ACTIVE=1; 
  STATUS_INACTIVE=2; 
  STATUS_SUSPENDED=3; 
  STATUS_RELEASED=4;
}

enum PlayerPosition {
  PLAYER_POSITION_UNSPECIFIED = 0;

  PLAYER_POSITION_GK  = 1;

  PLAYER_POSITION_CB  = 2;
  PLAYER_POSITION_LB  = 3;
  PLAYER_POSITION_RB  = 4;
  PLAYER_POSITION_LWB = 5;
  PLAYER_POSITION_RWB = 6;

  PLAYER_POSITION_CDM = 7;
  PLAYER_POSITION_CM  = 8;
  PLAYER_POSITION_CAM = 9;
  PLAYER_POSITION_LM  = 10;
  PLAYER_POSITION_RM  = 11;

  PLAYER_POSITION_LW  = 12;
  PLAYER_POSITION_RW  = 13;
  PLAYER_POSITION_CF  = 14;
  PLAYER_POSITION_ST  = 15;
}

message ListTeamPlayerReq{
   string team_id=1; 
   int32  page=2; 
   int32 limit=3; 
   string position=4;   
   PlayerStatus player_status=5;
   string search=6;
}


message PlayerList{
   string player_id=1;
   string team_member_id=2;
   string full_name=3;
   int32 jersey_number=4; 
   PlayerPosition position=5;
}

message PaginationDetails{
    int32 total_page=1; 
    int32 page=2; 
    int32 limit=3;  
    int64 total_item=4;
}


message ListTeamPlayerRes{ 
   PaginationDetails paginate=1;
   repeated PlayerList players=2;
}

message GetPlayerReq{
   string player_id=1; 
}


message  GetPlayerRes {
  string player_id=1; 
  string team_member_id=2;
  string full_name=3; 
  google.protobuf.Timestamp dob=4; 
  int32 jersey_number=5; 
  PlayerPosition player_position = 6; 
  float height=7;
  float weight=8;  
  PlayerStatus player_status = 9; 
  google.protobuf.Timestamp created_at = 10;
}


message AddLogoReq{

}

message AddLogoRes{

}


service PlayerService{
  rpc AddNewPlayer(AddPlayerReq)returns(AddPlayerRes); 
  rpc UpdatePlayerStatus(UpdatePlayerStatusReq)returns(UpdatePlayerStatusRes); 
  rpc ListTeamPlayer(ListTeamPlayerReq)returns(ListTeamPlayerRes);  
  rpc GetPlayer(GetPlayerReq)returns(GetPlayerRes);
  rpc AddLogo(AddLogoReq)returns(AddLogoRes);
}



message CreateInvitationReq{
   string team_member_id=1; 
   string role=2; 
   string user_id=3;
  } 

message CreateInvitationRes{
  string code=1; 
  google.protobuf.Timestamp created_at = 2; 
  google.protobuf.Timestamp expired_at=3; 
}



service   TeamInvite {
    rpc CreateInvitation(CreateInvitationReq)returns(CreateInvitationRes); 
}


enum StaffDesignation {
  STAFF_DESIGNATION_UNSPECIFIED = 0;
  STAFF_DESIGNATION_HEAD_COACH = 1;
  STAFF_DESIGNATION_ASSISTANT_COACH = 2;
  STAFF_DESIGNATION_GOALKEEPER_COACH = 3;
  STAFF_DESIGNATION_FITNESS_COACH = 4;
  STAFF_DESIGNATION_PHYSIO = 5;
  STAFF_DESIGNATION_DOCTOR = 6;
  STAFF_DESIGNATION_ANALYST = 7;
  STAFF_DESIGNATION_TEAM_COORDINATOR = 8;
  STAFF_DESIGNATION_EQUIPMENT_MANAGER = 9;
  STAFF_DESIGNATION_OTHER = 10;
}

enum TeamMemberRole {
  TEAM_MEMBER_ROLE_UNSPECIFIED = 0;
  TEAM_MEMBER_ROLE_OWNER = 1;
  TEAM_MEMBER_ROLE_MANAGER = 2;
  TEAM_MEMBER_ROLE_STAFF = 3;
  TEAM_MEMBER_ROLE_PLAYER = 4;
}


message AddStaffReq{
  string user_id=1; 
  string team_id=2; 
  string full_name=3; 
  StaffDesignation designation=4; 
  google.protobuf.Timestamp dob=5; 
  TeamMemberRole role=6;
}

message AddStaffRes{
  string staff_id=1; 
  string team_member_id=2; 
  string full_name=3; 
  int32 age=4; 
  string designatin=5; 
}


service StaffService {
     rpc AddStaff(AddStaffReq)returns(AddStaffRes); 
}